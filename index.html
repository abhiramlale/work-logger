<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --border: #242424;
      --border2: #2a2a2a;
      --text: #e8e4d9;
      --muted: #888;
      --dim: #555;
      --vdim: #3a3a3a;
      --accent: #c8f060;
      --accent-hover: #d4f870;
      --ok-bg: #0d1f02;
      --ok-border: #3a5a10;
      --err-bg: #1f0d0d;
      --err-border: #5a1010;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-title {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #clock {
      margin-left: auto;
      font-size: 11px;
      color: #333;
    }

    main {
      width: 100%;
      max-width: 600px;
      padding: 28px 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .optional { color: #3a3a3a; }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder, textarea::placeholder { color: var(--vdim); }

    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    button {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { background: #1a1a1a; color: var(--dim); cursor: not-allowed; }

    #result {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 3px;
      font-size: 12px;
      display: none;
    }

    #result.ok { background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--accent); }
    #result.err { background: var(--err-bg); border: 1px solid var(--err-border); color: #f06060; }

    #result .raw {
      margin-top: 8px;
      color: #444;
      font-size: 11px;
      word-break: break-all;
    }

    .session-title {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
      margin: 28px 0 12px;
    }

    .log-entry {
      padding: 12px 14px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .log-arrow { color: var(--accent); padding-top: 1px; flex-shrink: 0; }

    .log-project { color: var(--text); font-size: 12px; }
    .log-sep { color: #444; margin: 0 5px; }
    .log-task { color: var(--muted); font-size: 12px; }
    .log-time { color: #444; font-size: 11px; margin-top: 3px; }

    .log-status {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 7px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      main { padding: 20px 14px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <span class="header-title">Work Activity Logger</span>
  <span id="clock"></span>
</header>

<main>
  <div class="card">

    <div class="field">
      <label>Start Time</label>
      <input type="text" id="startTime" />
    </div>

    <div class="row">
      <div class="field">
        <label>Project *</label>
        <input type="text" id="project" placeholder="e.g. Cloud Nine" />
      </div>
      <div class="field">
        <label>Task *</label>
        <input type="text" id="task" placeholder="e.g. Generate PO" />
      </div>
    </div>

    <div class="field">
      <label>Work Done</label>
      <textarea id="workDone" placeholder="Describe what you're starting..."></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>Status</label>
        <select id="status">
          <option>In Progress</option>
          <option>Completed</option>
          <option>On Hold</option>
          <option>Blocked</option>
        </select>
      </div>
      <div class="field">
        <label>End Time <span class="optional">(optional)</span></label>
        <input type="text" id="endTime" placeholder="leave blank if ongoing" />
      </div>
    </div>

    <button id="logBtn" onclick="submitLog()">Log Activity →</button>

    <div id="result">
      <div id="resultMsg"></div>
      <div class="raw" id="resultRaw"></div>
    </div>
  </div>

  <div id="sessionLogs"></div>
</main>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzdVVrEw8BTTEEppn7TDSNXOpSf33MUqpI7oDk3ojmm29ZmTqHf8HDniy1usw4Go_bEEQ/exec";

  const sessionLogs = [];

  function nowStr() {
    const d = new Date();
    const p = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  // Clock
  function updateClock() {
    document.getElementById("clock").textContent = nowStr();
  }
  updateClock();
  setInterval(updateClock, 60000);

  // Set start time on load
  document.getElementById("startTime").value = nowStr();

  async function submitLog() {
    const project = document.getElementById("project").value.trim();
    const task = document.getElementById("task").value.trim();

    if (!project || !task) {
      showResult(false, "Project and Task are required.", null);
      return;
    }

    const payload = {
      startTime: document.getElementById("startTime").value,
      endTime: document.getElementById("endTime").value,
      project,
      task,
      workDone: document.getElementById("workDone").value.trim(),
      status: document.getElementById("status").value,
    };

    const btn = document.getElementById("logBtn");
    btn.disabled = true;
    btn.textContent = "Logging...";
    showResult(false, "", null);
    document.getElementById("result").style.display = "none";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const text = await res.text();
      let ok = res.ok;
      try { const j = JSON.parse(text); ok = j.status === "success" || !j.error; } catch(_) {}
      showResult(ok, ok ? "✓ Logged successfully!" : "API responded — check raw output below.", text);
      if (ok) { addToSession(payload); resetForm(); }
    } catch (err) {
      // CORS fallback
      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        showResult(true, "✓ Sent! (Check your sheet to confirm — no-cors mode)", "Response hidden in no-cors mode.");
        addToSession(payload);
        resetForm();
      } catch(e2) {
        showResult(false, "Network error: " + e2.message, null);
      }
    }

    btn.disabled = false;
    btn.textContent = "Log Activity →";
  }

  function showResult(ok, msg, raw) {
    const el = document.getElementById("result");
    el.className = ok ? "ok" : "err";
    el.style.display = "block";
    document.getElementById("resultMsg").textContent = msg;
    const rawEl = document.getElementById("resultRaw");
    rawEl.textContent = raw || "";
    rawEl.style.display = raw ? "block" : "none";
  }

  function resetForm() {
    document.getElementById("startTime").value = nowStr();
    document.getElementById("endTime").value = "";
    document.getElementById("project").value = "";
    document.getElementById("task").value = "";
    document.getElementById("workDone").value = "";
    document.getElementById("status").value = "In Progress";
  }

  function addToSession(payload) {
    sessionLogs.unshift(payload);
    const container = document.getElementById("sessionLogs");
    if (sessionLogs.length === 1) {
      const title = document.createElement("div");
      title.className = "session-title";
      title.textContent = "This Session";
      container.prepend(title);
    }
    const entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerHTML = `
      <div class="log-arrow">▸</div>
      <div>
        <div>
          <span class="log-project">${payload.project}</span>
          <span class="log-sep">·</span>
          <span class="log-task">${payload.task}</span>
        </div>
        <div class="log-time">${payload.startTime}</div>
      </div>
      <div class="log-status">${payload.status}</div>
    `;
    // Insert after the title
    const title = container.querySelector(".session-title");
    if (title) title.after(entry);
    else container.prepend(entry);
  }
</script>

</body>
</html>
